<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login — Pyrex</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 400px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h3 class="mb-4 text-center">🔥 Pyrex Admin</h3>
        <div id="error" class="alert alert-danger d-none"></div>
        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control" placeholder="admin@example.com">
        </div>
        <div class="mb-3">
            <label>Password</label>
            <input type="password" id="password" class="form-control">
        </div>
        <button class="btn btn-primary w-100" onclick="login()">Login</button>
    </div>

    <script>
        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            // ✅ CSRF token முதல்ல எடு
            const csrfRes = await fetch("/csrf-token");
            const csrfData = await csrfRes.json();
            const csrfToken = csrfData.csrf_token;

            const res = await fetch("/api/v1/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-csrf-token": csrfToken,  // ✅ header-ல அனுப்பு
                },
                credentials: "include",
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (data.error) {
                document.getElementById("error").textContent = data.error;
                document.getElementById("error").classList.remove("d-none");
                return;
            }

            window.location.href = "/admin";
        }
    </script>
</body>

</html>
