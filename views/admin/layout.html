<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Pyrex Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .sidebar { min-height: 100vh; background: #1e293b; }
    .sidebar a { color: #94a3b8; text-decoration: none; display: block; padding: 10px 20px; }
    .sidebar a:hover { background: #334155; color: white; }
    .sidebar .brand { color: white; font-size: 20px; font-weight: bold; padding: 20px; border-bottom: 1px solid #334155; }
    .main-content { background: #f8fafc; min-height: 100vh; }
    .stat-card { border-radius: 12px; padding: 20px; color: white; }
  </style>
</head>
<body>
  <div class="d-flex">
    <div class="sidebar" style="width:250px">
      <div class="brand">🔥 Pyrex Admin</div>
      <a href="/admin">📊 Dashboard</a>
      <a href="/admin/users">👥 Users</a>
      <a href="/admin/audit">📝 Audit Logs</a>
      <a href="/" style="margin-top:auto">← Back to Site</a>
    </div>
    <div class="main-content flex-grow-1 p-4">
      <h4 class="mb-4">{{ title }}</h4>
      {% block content %}{% endblock %}
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
