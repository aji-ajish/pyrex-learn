{% extends "layouts/base.html" %}

{% block content %}
  <h1>Welcome to Pyrex, {{ name }}!</h1>
  
  {% if role === "admin" %}
    <p>You are an Admin! 🔥</p>
  {% endif %}

  <h2>Users:</h2>
  {% for user in users %}
    <div>
      <p>{{ user.name }} — {{ user.email }}</p>
    </div>
  {% endfor %}
{% endblock %}
